<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Linls</title>
        <style>
            /*
            # = id
            . = class
            : = pseudo-class
            :: = pseud-element
            > = clildren
            */
            body {
                font-family: Arial, Helvetica, sans-serif;
            }

            a {
                color: red;
                text-decoration: none;
                font-weight: bold;
            }

            a:visited {
                color: blue;
            }

            a:hover {
                color: rgb(108, 108, 232);
                text-decoration: underline;
            }

            a:active {
                color: brown;
            }

            a::after {
                content: "[link]";
                text-decoration: none;
                font-weight: normal;
                color: darkgray;
            }
        </style>
    </head>
    <body>
        <h1>Personalizando Links</h1>
        <ul>
            <li>
                <a href="https://github.com/mateusgoncalves2008"
                    >Reposítorio GitHub</a
                >
            </li>
            <li>
                <a href="https://www.youtube.com/feed/you">Canal do YouTube</a>
            </li>
            <li>
                <a href="https://www.cursoemvideo.com/">Site do CursoemVideo</a>
            </li>
        </ul>
    </body>
</html>
