<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Posicão dos Fundos</title>
        <style>
            .bloco {
                height: 200px;
                border: 1px solid black;
                margin: 10px;
                border-radius: 20px;
                background-image: url("img/wallpaper002.jpg");
            }

            #qI {
                background-position: left top;
            }

            #qII {
                background-position: left center;
            }
            #qIII {
                background-position: right bottom;
            }

            #qIV {
                background-position: center center;
            }
        </style>
    </head>
    <body>
        <div class="bloco" id="qI"></div>
        <div class="bloco" id="qII"></div>
        <div class="bloco" id="qIII"></div>
        <div class="bloco" id="qIV"></div>
    </body>
</html>
