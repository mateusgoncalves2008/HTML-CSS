<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>

    <picture>
        <source media="(max-width:750px)" srcset="Imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="Imagens/foto.m.png" type="image/png">
        <img src="/Imagens/foto-g.png" alt="Imagem flexível">
    </picture>
    
    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender a reproduzir áudios em  HTML5.</p>
    <audio preload="metadata" autoplay controls loop>
        <source src="/Midia/Merry Go - Silent Film Light - Kevin MacLeod.mp3" type="audio/mpeg">
        <source src="/Midia/Merry Go - Silent Film Light - Kevin MacLeod.mp3" type="audio/ogg">
        <source src="/Midia/" type="audio/wav">
        <p>Infelizmente seu navegador náo consege=ue reproduzir áudio.</p>
        <href=/Midia/Merry Go - Silent Film Light - Kevin MacLeod.mp3>Clique aqui para baixar o arquivo MP3.</audio>
</body>
</html>
