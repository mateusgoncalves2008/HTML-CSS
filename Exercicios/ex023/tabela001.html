<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tabelas</title>
        <style>
            body {
                font-family: Arial, Helvetica, sans-serif;
            }

            table {
                height: 400px;
                width: 400px;
                border-collapse: collapse;

                /*
            border-collapse:collapse; 
                "Fala pra deixar todos os <td> juntos, sem espaço."
        */
            }

            td {
                border: 1px solid black;
                padding: 8px;
                text-align: center;
                /*Alinhamento horizontal*/
                vertical-align: top;
            }
        </style>
    </head>
    <body>
        <h1>Minha primeira tabela</h1>
        <!--
            HIERARQUIA DE TABELAS (simples)
            TABLE = tabela
                TABLE ROW = linha de tabela
                    TABLE HEADER = cabeçalho de tabela
                    TABLE DATA = dado de tabela

    -->
        <table>
            <tr>
                <!--  Primeira linha -->

                <td>A1</td>
                <td>B1</td>
                <td>C1</td>
            </tr>
            <tr class="linha">
                <td>A2</td>
                <td>B2</td>
                <td>C2</td>
            </tr>
            <tr>
                <td>A3</td>
                <td>B3</td>
                <td>C3</td>
            </tr>
            <tr class="linha">
                <td>A4</td>
                <td>B4</td>
                <td>C4</td>
            </tr>
        </table>
    </body>
</html>
