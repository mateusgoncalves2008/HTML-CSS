<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tabelas</title>
        <style>
            body {
                font-family: Arial, Helvetica, sans-serif;
            }

            table {
                border-collapse: collapse;
                width: 300px;
            }

            td {
                border: 1px solid black;
                padding: 10px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <h1>Mesclagem de Células</h1>

        <table>
            <tr>
                <td colspan="3">1-I</td>
            </tr>

            <tr>
                <td rowspan="3">4-IV</td>
                <td>5-V</td>
                <td rowspan="3">6-VI</td>
            </tr>

            <tr>
                <td>8-VIII</td>
            </tr>

            <tr>
                <td>11-XI</td>
            </tr>

            <tr>
                <td colspan="3">14-XIV</td>
            </tr>
        </table>
    </body>
</html>
