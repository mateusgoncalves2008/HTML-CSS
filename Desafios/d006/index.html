<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="icons8-castelo-48.png" type="image/x-icon">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.</p>
    <ul type="square">
        <li><abbr title="Use a tag &lt;p&gt;">Parágrafo </abbr></li>
        <li><abbr title="Use a tag &lt;h1&gt;">Títulos</abbr></li>
        <li><abbr title="Use a tag &lt;img&gt;">Imagens</abbr></li>
        <li><abbr title="Use a tag &lt;Mark&gt;">Marcação de texto</abbr></li>
        <li><abbr title="Use a tag &#x">Emojis</abbr></li>
        <li><abbr title="Use a tag &lt;br&gt;">Quebras de linha</abbr></li>
        <li><abbr title="Use a tag &lt;link : favion&gt;">Ícone no site</abbr></li>
    </ul>
</body>
</html>
